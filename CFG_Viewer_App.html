<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Teltonika CFG Viewer</title>
  <style>
    body{font-family:Segoe UI,Arial,sans-serif;background:#f3f5f9;color:#1d2430;margin:0}
    .wrap{max-width:1200px;margin:0 auto;padding:14px}
    .card{background:#fff;border-radius:12px;box-shadow:0 1px 10px rgba(0,0,0,.08);padding:12px}
    .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .btn{border:1px solid #c7cfdd;background:#fff;padding:8px 12px;border-radius:8px;cursor:pointer}
    .btn.primary{background:#1f6feb;color:#fff;border-color:#1f6feb}
    .input{padding:8px 10px;border:1px solid #c7cfdd;border-radius:8px;min-width:240px}
    .mono{font-family:Consolas,monospace}
    .muted{font-size:12px;color:#5f6b7c}
    .tabs{display:flex;gap:6px;margin-top:10px}
    .tab{padding:8px 10px;border:1px solid #c7cfdd;border-radius:8px;cursor:pointer;background:#fff}
    .tab.active{background:#e8f0ff;border-color:#9db7f7}
    .pane{display:none;margin-top:10px}
    .pane.active{display:block}
    textarea{width:100%;min-height:300px;resize:vertical;padding:10px;border:1px solid #c7cfdd;border-radius:10px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .tbl{width:100%;border-collapse:collapse;font-size:13px}
    .tbl th,.tbl td{border:1px solid #e1e6ef;padding:6px 8px;text-align:left;vertical-align:top}
    .tbl th{background:#f0f4fb}
    .ok{color:#0f7b3c;font-weight:600}
    .bad{color:#b42318;font-weight:600}
    .warn{color:#8a6514;font-weight:600}
    .status{padding:8px 10px;border-radius:8px;font-size:13px;margin-top:8px}
    .status.pass{background:#e8f8ef;border:1px solid #9fdfb8;color:#0f7b3c}
    .status.fail{background:#fff5f5;border:1px solid #f2b8b8;color:#b42318}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h2 style="margin:4px 0 10px;">Teltonika CFG Viewer (Web)</h2>
      <div class="row">
        <input id="cfgFile" type="file" accept=".cfg,.txt,application/octet-stream" class="input" title="Choose CFG file" aria-label="Choose CFG file">
        <button id="btnExportJson" class="btn">Export JSON</button>
        <button id="btnExportCsv" class="btn">Export CSV</button>
        <input id="filterInput" class="input" placeholder="Filter id/name/value" title="Filter table rows" aria-label="Filter table rows">
      </div>
      <div class="row" style="margin-top:8px;">
        <input id="cfgUrl" class="input" style="min-width:460px" placeholder="SharePoint/URL to a single .cfg file" title="CFG file URL" aria-label="CFG file URL">
        <button id="btnLoadUrl" class="btn primary">Load from URL</button>
        <span class="muted">Use direct file link (not folder link)</span>
      </div>
      <div class="row" style="margin-top:8px;">
        <span class="muted">Loaded file:</span>
        <span id="loadedFile" class="mono muted">No file loaded</span>
      </div>
      <div id="globalStatus" class="status fail" style="display:none;"></div>

      <div class="tabs">
        <button class="tab active" data-tab="preview">Preview</button>
        <button class="tab" data-tab="compare">Compare</button>
        <button class="tab" data-tab="header">Header</button>
        <button class="tab" data-tab="fields">Fields</button>
      </div>

      <div id="pane-preview" class="pane active">
        <textarea id="previewText" class="mono" readonly title="CFG preview output" aria-label="CFG preview output"></textarea>
      </div>

      <div id="pane-compare" class="pane">
        <div class="muted" style="margin-bottom:8px;">Required values vs loaded CFG values</div>
        <table class="tbl" id="compareTable">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Expected</th><th>Actual</th><th>Status</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="pane-header" class="pane">
        <table class="tbl" id="headerTable">
          <thead><tr><th>Key</th><th>Value</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>

      <div id="pane-fields" class="pane">
        <table class="tbl" id="fieldsTable">
          <thead>
            <tr><th>ID</th><th>Name</th><th>Value</th><th>Mapped</th></tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    var KNOWN_FIELDS = {
      "2000":"gprs_enabled","2001":"apn","2002":"apn_username","2003":"apn_password","2004":"primary_server_domain",
      "2005":"primary_server_port","2006":"primary_server_protocol","2007":"secondary_server_domain_or_ip","2008":"secondary_server_port",
      "2009":"secondary_server_protocol","2010":"server_mode","2011":"apn_authentication","2015":"imei","2016":"ack_type",
      "2017":"sort_order","2020":"auto_apn","2022":"limit_connection_errors","1000":"open_link_timeout_s","1001":"response_timeout_s",
      "1002":"network_ping_timeout_s","1003":"network_ping_period_s","902":"ntp_server_1","903":"ntp_server_2",
      "13000":"fota_domain","13001":"fota_port","13002":"fota_period_min","13003":"fota_enabled"
    };
    var REQUIRED_VALUES = {
      "2001":"internet.pelephone.net","2002":"pcl@3g","2004":"tracker.navixy.com","2005":"47776","2006":"0",
      "2007":"79.177.133.243","2008":"15027","2009":"0","2010":"2","13000":"fm.teltonika.lt","13001":"5000","13002":"720","13003":"1"
    };
    var PROTOCOL_MAP = {"0":"TCP","1":"UDP","2":"MQTT"};
    var BOOL_MAP = {"0":"False","1":"True"};
    var SERVER_MODE_MAP = {"0":"Disabled","1":"Backup","2":"Duplicate"};
    var ACK_TYPE_MAP = {"0":"TCP/IP","1":"AVL","2":"Unknown(2)"};
    var SORT_ORDER_MAP = {"0":"Oldest","1":"Newest","2":"Unknown(2)"};
    var AUTH_MAP = {"0":"None","1":"Normal(PAP)","2":"Secured(CHAP)"};
    var PREVIEW_IDS = ["2001","2002","2003","2004","2005","2006","2007","2008","2009","2010","13000","13001","13002","13003"];

    var STATE = { fileName:"", header:{}, numeric:{} };

    function esc(s){return String(s==null?"":s).replace(/[&<>"']/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c];});}
    function mappedValue(id, value){
      if(id==="2006"||id==="2009") return PROTOCOL_MAP[value]||value;
      if(id==="2010") return SERVER_MODE_MAP[value]||value;
      if(id==="2011") return AUTH_MAP[value]||value;
      if(id==="2016") return ACK_TYPE_MAP[value]||value;
      if(id==="2017") return SORT_ORDER_MAP[value]||value;
      if(id==="2000"||id==="2020"||id==="2022"||id==="13003") return BOOL_MAP[value]||value;
      return value;
    }
    function parseCfg(text){
      var header={}, numeric={};
      String(text||"").split(";").forEach(function(tok){
        tok=tok.trim();
        if(!tok || tok.indexOf(":")<0) return;
        var p=tok.split(":");
        var k=(p.shift()||"").trim();
        var v=p.join(":").trim();
        if(/^\d+$/.test(k)) numeric[k]=v; else header[k]=v;
      });
      return {header:header,numeric:numeric};
    }
    function applyLoadedData(fileName, text){
      var p=parseCfg(text);
      STATE.fileName=fileName||"remote.cfg";
      STATE.header=p.header;
      STATE.numeric=p.numeric;
      document.getElementById("loadedFile").textContent=STATE.fileName;
      renderPreview();
      compareValues();
      renderTables();
    }
    function toDirectSharePointUrl(url){
      var u=String(url||"").trim();
      if(!u) return "";
      if(/\/:f:\//i.test(u)) return "__FOLDER_LINK__";
      if(/download=1/i.test(u)) return u;
      if(/sharepoint\.com/i.test(u)){
        return u + (u.indexOf("?")>=0 ? "&download=1" : "?download=1");
      }
      return u;
    }
    async function decodeCfgFile(file){
      var ab=await file.arrayBuffer();
      var bytes=new Uint8Array(ab);
      try{
        if(typeof DecompressionStream!=="undefined"){
          var ds=new DecompressionStream("gzip");
          var stream=new Blob([bytes]).stream().pipeThrough(ds);
          return await new Response(stream).text();
        }
      }catch(e){}
      return new TextDecoder("utf-8",{fatal:false}).decode(bytes);
    }

    function renderPreview(){
      var n=STATE.numeric||{}, h=STATE.header||{};
      var lines=[
        "Loaded file: "+(STATE.fileName||""),
        "Header fields: "+Object.keys(h).length,
        "Numeric fields: "+Object.keys(n).length,
        "",
        "Quick preview:"
      ];
      PREVIEW_IDS.forEach(function(id){
        if(!(id in n)) return;
        var raw=n[id], mapped=mappedValue(id,raw), name=KNOWN_FIELDS[id]||"unknown";
        lines.push("- "+id+" | "+name+" = "+raw+" ("+mapped+")");
      });
      document.getElementById("previewText").value=lines.join("\n");
    }

    function compareValues(){
      var tbody=document.querySelector("#compareTable tbody");
      var n=STATE.numeric||{};
      var html="", missing=0, mismatch=0;
      Object.keys(REQUIRED_VALUES).forEach(function(id){
        var exp=String(REQUIRED_VALUES[id]);
        var has=(id in n), act=has?String(n[id]):"";
        var ok=has && act===exp;
        var status=ok?'<span class="ok">PASS</span>':(has?'<span class="bad">MISMATCH</span>':'<span class="warn">MISSING</span>');
        if(!ok){ if(has) mismatch++; else missing++; }
        html+='<tr><td class="mono">'+id+'</td><td>'+esc(KNOWN_FIELDS[id]||"unknown")+'</td><td class="mono">'+esc(exp)+'</td><td class="mono">'+esc(act||"—")+'</td><td>'+status+'</td></tr>';
      });
      tbody.innerHTML=html;
      var status=document.getElementById("globalStatus");
      if(missing===0 && mismatch===0){
        status.className="status pass";
        status.textContent="Validation PASSED: all required fields match expected values.";
      }else{
        status.className="status fail";
        status.textContent="Validation FAILED: missing="+missing+", mismatch="+mismatch+".";
      }
      status.style.display="block";
    }

    function renderTables(){
      var pattern=String(document.getElementById("filterInput").value||"").toLowerCase().trim();
      var hRows=Object.keys(STATE.header).sort().filter(function(k){
        var v=String(STATE.header[k]||"");
        return !pattern || (k+" "+v).toLowerCase().indexOf(pattern)>=0;
      }).map(function(k){ return '<tr><td>'+esc(k)+'</td><td class="mono">'+esc(STATE.header[k])+'</td></tr>'; }).join("");
      document.querySelector("#headerTable tbody").innerHTML=hRows||'<tr><td colspan="2" class="muted">No header fields.</td></tr>';

      var ids=Object.keys(STATE.numeric).sort(function(a,b){return Number(a)-Number(b);});
      var fRows=ids.filter(function(id){
        var name=KNOWN_FIELDS[id]||"", val=STATE.numeric[id], map=mappedValue(id,val);
        return !pattern || (id+" "+name+" "+val+" "+map).toLowerCase().indexOf(pattern)>=0;
      }).map(function(id){
        var name=KNOWN_FIELDS[id]||"", val=STATE.numeric[id], map=mappedValue(id,val);
        return '<tr><td class="mono">'+id+'</td><td>'+esc(name)+'</td><td class="mono">'+esc(val)+'</td><td class="mono">'+esc(map)+'</td></tr>';
      }).join("");
      document.querySelector("#fieldsTable tbody").innerHTML=fRows||'<tr><td colspan="4" class="muted">No numeric fields.</td></tr>';
    }

    function downloadText(fileName, text){
      var blob=new Blob([text],{type:"text/plain;charset=utf-8"});
      var url=URL.createObjectURL(blob);
      var a=document.createElement("a");
      a.href=url;a.download=fileName;document.body.appendChild(a);a.click();a.remove();
      setTimeout(function(){URL.revokeObjectURL(url);},1000);
    }

    document.getElementById("cfgFile").addEventListener("change", async function(e){
      var f=e.target.files&&e.target.files[0]?e.target.files[0]:null;
      if(!f) return;
      var txt=await decodeCfgFile(f);
      applyLoadedData(f.name, txt);
    });
    document.getElementById("btnLoadUrl").addEventListener("click", async function(){
      var raw=document.getElementById("cfgUrl").value.trim();
      if(!raw){ alert("Paste a direct .cfg file URL first."); return; }
      var url=toDirectSharePointUrl(raw);
      if(url==="__FOLDER_LINK__"){
        alert("This is a SharePoint folder link. Please open the CFG file in SharePoint and copy its direct file link, or use local file picker from synced OneDrive folder.");
        return;
      }
      try{
        var res=await fetch(url,{method:"GET",credentials:"include"});
        if(!res.ok) throw new Error("HTTP "+res.status);
        var txt=await res.text();
        if(txt.indexOf(":")<0 || txt.indexOf(";")<0){
          throw new Error("Response does not look like a CFG payload");
        }
        var name=(url.split("/").pop()||"remote.cfg").split("?")[0]||"remote.cfg";
        applyLoadedData(name, txt);
      }catch(err){
        alert(
          "Failed to load from URL.\n\n"+
          "Possible causes:\n"+
          "- SharePoint auth/CORS restrictions\n"+
          "- Link is a folder/share UI link, not direct file URL\n\n"+
          "Recommended fallback:\n"+
          "Sync SharePoint library with OneDrive and load the file using the file picker.\n\n"+
          "Technical error: "+(err&&err.message?err.message:String(err))
        );
      }
    });
    document.getElementById("filterInput").addEventListener("input", renderTables);
    document.getElementById("btnExportJson").addEventListener("click", function(){
      if(!STATE.fileName){ alert("Load CFG first"); return; }
      downloadText(STATE.fileName.replace(/\.cfg$/i,"")+"_parsed.json", JSON.stringify({header:STATE.header,data:STATE.numeric},null,2));
    });
    document.getElementById("btnExportCsv").addEventListener("click", function(){
      if(!STATE.fileName){ alert("Load CFG first"); return; }
      var lines=["ID,Name,Value,Mapped"];
      Object.keys(STATE.numeric).sort(function(a,b){return Number(a)-Number(b);}).forEach(function(id){
        var row=[id,KNOWN_FIELDS[id]||"",STATE.numeric[id],mappedValue(id,STATE.numeric[id])].map(function(v){ return '"'+String(v).replace(/"/g,'""')+'"'; });
        lines.push(row.join(","));
      });
      downloadText(STATE.fileName.replace(/\.cfg$/i,"")+"_parsed.csv", lines.join("\n"));
    });
    Array.prototype.forEach.call(document.querySelectorAll(".tab"), function(btn){
      btn.addEventListener("click", function(){
        Array.prototype.forEach.call(document.querySelectorAll(".tab"), function(x){x.classList.remove("active");});
        Array.prototype.forEach.call(document.querySelectorAll(".pane"), function(x){x.classList.remove("active");});
        btn.classList.add("active");
        document.getElementById("pane-"+btn.getAttribute("data-tab")).classList.add("active");
      });
    });
  </script>
</body>
</html>
