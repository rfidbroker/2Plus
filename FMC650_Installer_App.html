<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>FMC650 — אשף התקנה</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;padding:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,Helvetica,sans-serif;
    background:#f0f2f5;direction:rtl;font-size:15px;color:#222;}

  /* ─── Layout ─── */
  #app{max-width:600px;margin:0 auto;padding:12px;}
  .card{background:#fff;border-radius:14px;padding:18px;margin-bottom:14px;
    -webkit-box-shadow:0 2px 12px rgba(0,0,0,.07);box-shadow:0 2px 12px rgba(0,0,0,.07);}

  /* ─── Header ─── */
  .hdr{background:#1A3A5C;background:-webkit-linear-gradient(315deg,#1A3A5C,#0D7377);
    background:linear-gradient(135deg,#1A3A5C,#0D7377);
    border-radius:14px;padding:16px 18px;margin-bottom:14px;color:#fff;
    display:-webkit-flex;display:flex;
    -webkit-justify-content:space-between;justify-content:space-between;
    -webkit-align-items:center;align-items:center;}
  .hdr-title{font-size:19px;font-weight:900;margin:0;}
  .hdr-sub{font-size:12px;opacity:.8;margin:2px 0 0;}
  .hdr-icon{font-size:38px;text-align:center;margin-right:12px;}
  .hdr-overall{margin-top:8px;background:rgba(255,255,255,.2);border-radius:8px;
    height:6px;overflow:hidden;}
  .hdr-overall-fill{height:100%;background:#fff;border-radius:8px;
    -webkit-transition:width .4s;transition:width .4s;}
  .hdr-overall-lbl{font-size:10px;opacity:.7;margin-top:3px;}

  /* ─── Step nav ─── */
  .step-nav{display:-webkit-flex;display:flex;overflow-x:auto;padding:10px 0 4px;
    scrollbar-width:none;-webkit-overflow-scrolling:touch;}
  .step-nav::-webkit-scrollbar{display:none;}
  .step-btn{-webkit-flex:0 0 auto;flex:0 0 auto;display:-webkit-flex;display:flex;
    -webkit-flex-direction:column;flex-direction:column;
    -webkit-align-items:center;align-items:center;
    padding:8px 12px;border-radius:10px;border:2px solid #dee2e6;
    background:#fff;cursor:pointer;min-width:65px;margin-left:6px;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    -webkit-transition:all .2s;transition:all .2s;font-size:11px;font-weight:700;color:#777;}
  .step-btn:first-child{margin-left:0;}
  .step-btn.active{-webkit-transform:translateY(-2px);transform:translateY(-2px);}
  .step-btn .s-icon{font-size:18px;margin-bottom:3px;}
  .step-count{font-size:10px;font-weight:700;margin-top:1px;}
  .swipe-hint{text-align:center;font-size:11px;color:#aaa;padding:2px 0 8px;}

  /* ─── Progress ─── */
  .prog-bar{height:8px;background:#dee2e6;border-radius:8px;overflow:hidden;margin:8px 0 16px;}
  .prog-fill{height:100%;border-radius:8px;-webkit-transition:width .4s;transition:width .4s;}
  .prog-label{display:-webkit-flex;display:flex;
    -webkit-justify-content:space-between;justify-content:space-between;
    font-size:12px;color:#888;margin-bottom:3px;}

  /* ─── Inherited data banner ─── */
  .inh-banner{border-radius:10px;padding:12px 14px;margin-bottom:14px;}
  .inh-banner-title{font-weight:700;font-size:12px;margin-bottom:8px;}
  .inh-rows{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;}
  .inh-cell{margin-left:16px;margin-bottom:4px;font-size:13px;white-space:nowrap;}
  .inh-val{font-family:"Courier New",Courier,monospace;font-weight:700;}

  /* ─── Checklist ─── */
  .chk-item{display:-webkit-flex;display:flex;
    -webkit-align-items:flex-start;align-items:flex-start;
    padding:12px 12px;border-radius:8px;cursor:pointer;margin-bottom:6px;
    border:1.5px solid #dee2e6;background:#f4f6f8;
    -webkit-transition:all .15s;transition:all .15s;
    -webkit-user-select:none;user-select:none;-webkit-touch-callout:none;min-height:48px;}
  .chk-item.done{background:#D1F0E0;border-color:#198754;}
  .chk-box{width:24px;height:24px;min-width:24px;border-radius:5px;
    border:2px solid #adb5bd;background:#fff;display:-webkit-flex;display:flex;
    -webkit-align-items:center;align-items:center;
    -webkit-justify-content:center;justify-content:center;
    margin-top:1px;margin-left:10px;font-size:14px;font-weight:900;
    -webkit-transition:all .15s;transition:all .15s;}
  .chk-item.done .chk-box{background:#198754;border-color:#198754;color:#fff;}
  .chk-text{font-size:13.5px;line-height:1.5;color:#333;}
  .chk-item.done .chk-text{color:#155724;text-decoration:line-through;}

  /* ─── Info cards ─── */
  .info-card{display:-webkit-flex;display:flex;
    -webkit-align-items:flex-start;align-items:flex-start;
    border-radius:0 8px 8px 0;padding:10px 14px;margin-bottom:8px;}

  /* ─── Form ─── */
  .form-group{margin-bottom:12px;}
  .form-label{display:block;font-size:13px;font-weight:700;color:#1A3A5C;margin-bottom:4px;}
  .form-input{width:100%;padding:10px 12px;border-radius:7px;
    border:1.5px solid #dee2e6;font-size:14px;outline:none;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:#fff;-webkit-appearance:none;appearance:none;
    -webkit-transition:border-color .15s;transition:border-color .15s;}
  .form-input:focus{border-color:#0D6EFD;}
  .form-input.invalid{border-color:#dc3545;background:#fff8f8;}
  .form-input.valid{border-color:#198754;}
  .mono{font-family:"Courier New",Courier,monospace;direction:ltr;text-align:left;letter-spacing:.5px;}
  .form-hint{font-size:11px;color:#888;margin-top:3px;}
  .form-err{font-size:11px;color:#dc3545;margin-top:3px;font-weight:600;}
  .form-grid{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;margin:-5px;}
  .form-grid>.form-group{-webkit-flex:1 1 calc(50% - 10px);flex:1 1 calc(50% - 10px);
    min-width:140px;margin:5px;}

  /* ─── Buttons ─── */
  .btn{width:100%;padding:13px;border-radius:9px;border:none;
    font-size:15px;font-weight:700;cursor:pointer;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    -webkit-transition:all .2s;transition:all .2s;margin-bottom:8px;
    -webkit-tap-highlight-color:transparent;min-height:48px;}
  .btn-primary{color:#fff;}
  .btn-secondary{background:#fff;border:2px solid #dee2e6;color:#1A3A5C;}
  .btn:disabled{background:#adb5bd!important;cursor:not-allowed;opacity:.7;}
  .btn-row{display:-webkit-flex;display:flex;}
  .btn-row .btn{margin-bottom:0;}
  .btn-row .btn+.btn{margin-right:8px;}

  /* ─── Warnings ─── */
  .warn-box{background:#fff3cd;border:1.5px solid #ffc107;border-radius:8px;
    padding:10px 14px;font-size:13px;color:#856404;display:-webkit-flex;display:flex;
    -webkit-align-items:flex-start;align-items:flex-start;margin-bottom:14px;}
  .warn-box>span:first-child{margin-left:8px;font-size:18px;}

  /* ─── Code box ─── */
  .code-box{background:#0A2744;border-radius:8px;padding:12px 14px;
    font-family:"Courier New",Courier,monospace;font-size:13px;color:#00FF88;
    direction:ltr;margin-bottom:14px;line-height:1.7;}
  .code-comment{color:#aaa;}
  .code-yellow{color:#FFD700;}

  /* ─── Step header ─── */
  .step-hdr{border-right:5px solid;padding-right:14px;margin-bottom:16px;}
  .step-hdr h2{margin:0;font-size:20px;color:#1A3A5C;}
  .step-hdr p{margin:4px 0 0;color:#666;font-size:13px;}

  /* ─── Badge ─── */
  .badge{border-radius:12px;padding:3px 12px;font-size:12px;font-weight:700;display:inline-block;}

  /* ─── Done screen ─── */
  .done-hdr{background:#1A3A5C;background:-webkit-linear-gradient(315deg,#1A3A5C,#198754);
    background:linear-gradient(135deg,#1A3A5C,#198754);
    border-radius:14px;padding:28px;text-align:center;color:#fff;margin-bottom:16px;}
  .done-hdr .big-icon{font-size:56px;margin-bottom:10px;}
  .done-hdr h2{margin:0;font-size:24px;}
  .done-hdr p{margin:6px 0 0;opacity:.85;font-size:14px;}
  .summary-row{display:-webkit-flex;display:flex;
    -webkit-justify-content:space-between;justify-content:space-between;
    padding:7px 0;border-bottom:1px solid #dee2e6;font-size:14px;}
  .summary-row:last-child{border-bottom:none;}
  .summary-key{font-weight:700;color:#1A3A5C;}
  .summary-val{font-family:"Courier New",Courier,monospace;color:#333;font-size:13px;text-align:left;}

  /* ─── Mini status ─── */
  .mini-status{display:-webkit-flex;display:flex;
    -webkit-justify-content:center;justify-content:center;
    -webkit-flex-wrap:wrap;flex-wrap:wrap;margin-top:10px;}
  .mini-chip{border-radius:8px;padding:4px 10px;font-size:11px;margin:3px;
    border:1.5px solid #dee2e6;background:#fff;color:#888;}

  /* ─── Auto-save badge ─── */
  .save-badge{position:fixed;bottom:16px;left:16px;background:#198754;color:#fff;
    border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;
    opacity:0;-webkit-transition:opacity .4s;transition:opacity .4s;
    pointer-events:none;z-index:999;
    -webkit-box-shadow:0 2px 8px rgba(0,0,0,.2);box-shadow:0 2px 8px rgba(0,0,0,.2);}
  .save-badge.show{opacity:1;}

  /* ─── Print ─── */
  @media print{
    body{background:#fff;font-size:12px;}
    .step-nav,.btn,.btn-row,.warn-box,.mini-status,.save-badge,
    #btn-csv,#btn-restart,#btn-copy,#btn-print,#btn-clear-form,#btn-save-new,#btn-suggest-fotaweb,.btn-mini,.swipe-hint{display:none!important;}
    .card{-webkit-box-shadow:none;box-shadow:none;border:1px solid #dee2e6;
      page-break-inside:avoid;}
    .done-hdr{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  }

  textarea{resize:vertical;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;direction:rtl;}

  .wizard-toolbar{display:-webkit-flex;display:flex;-webkit-flex-wrap:wrap;flex-wrap:wrap;
    -webkit-justify-content:flex-end;justify-content:flex-end;gap:8px;margin:-4px 0 12px;}
  .btn-mini{padding:7px 12px;border-radius:7px;font-size:12px;font-weight:700;min-height:auto;margin:0;
    border:1.5px solid #dee2e6;background:#fff;color:#1A3A5C;cursor:pointer;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;}
  .btn-mini:hover{background:#f4f6f8;}

  .hdr-tech{font-size:11px;opacity:.88;margin-top:5px;line-height:1.4;word-break:break-word;}
  details.excel-advanced{margin-top:12px;border:1.5px solid #dee2e6;border-radius:10px;
    background:#fff;padding:4px 10px 10px;}
  details.excel-advanced>summary{cursor:pointer;font-weight:700;font-size:13px;color:#1A3A5C;
    padding:8px 4px;list-style-position:outside;}
  details.excel-advanced[open]>summary{margin-bottom:6px;border-bottom:1px solid #eee;}
  .req::after{content:" *";color:#dc3545;font-weight:900;}
  .gate-hint{font-size:12px;color:#856404;line-height:1.5;}
</style>
</head>

function luhn(num){
  var s=String(num).replace(/\D/g,"");
  if(s.length!==15) return false;
  var sum=0, dbl=false;
  for(var i=s.length-1;i>=0;i--){
    var d=Number(s.charAt(i));
    if(dbl){ d*=2; if(d>9) d-=9; }
    sum+=d;
    dbl=!dbl;
  }
  return sum%10===0;
}

var VALIDATORS = {
  imei: function(v){
    var n=String(v||"").replace(/\D/g,"");
    if(!n) return "";
    if(n.length!==15) return "IMEI חייב להיות בדיוק 15 ספרות";
    if(!luhn(n)) return "IMEI לא עבר Luhn check — בדוק מחדש";
    return "";
  },
  iccid: function(v){
    var n=String(v||"").replace(/\D/g,"");
    if(!n) return "";
    if(!/^\d{18,20}$/.test(n)) return "ICCID חייב להיות 18–20 ספרות";
    return "";
  },
  deviceName: function(v){
    if(!v) return "";
    if(!/^GSE-[A-Za-z]+-\d{4,5}$/.test(v)) return "פורמט: GSE-ACU-5032";
    return "";
  },
  simNum: function(v){
    if(!v) return "";
    var n=String(v).trim();
    if(!/^\+?\d{9,15}$/.test(n)) return "מספר טלפון חוקי: 9–15 ספרות (אפשר + בתחילה)";
    return "";
  },
  vin: function(v){
    if(!v) return "";
    if(v.length!==17) return "VIN חייב להיות בדיוק 17 תווים ("+v.length+" כרגע)";
    if(!/^[A-HJ-NPR-Z0-9]{17}$/i.test(v)) return "VIN מכיל תווים לא חוקיים (I,O,Q אסורים)";
    return "";
  },
  navixePort: function(v){
    if(!v) return "";
    var p=parseInt(v,10);
    if(isNaN(p)||p<1||p>65535) return "Port חייב להיות בין 1 ל-65535";
    return "";
  },
  smsPass: function(v){
    if(!v) return "";
    if(v==="1234") return "⚠️ אסור להשתמש בסיסמת ברירת מחדל 1234";
    if(v.length<4) return "סיסמה חייבת להכיל לפחות 4 תווים";
    return "";
  },
};

function validate(field, value){
  return (VALIDATORS[field]||function(){return "";})(value);
}

function parseCfgText(text){
  var numeric={}, header={};
  String(text||"").split(";").forEach(function(tok){
    tok=tok.trim();
    if(!tok || tok.indexOf(":")<0) return;
    var kv=tok.split(":");
    var k=(kv.shift()||"").trim();
    var v=kv.join(":").trim();
    if(/^\d+$/.test(k)) numeric[k]=v;
    else header[k]=v;
  });
  return {header:header, numeric:numeric};
}

function validateCfgValues(valuesById){
  var ids=Object.keys(CFG_REQUIRED_VALUES);
  var missing=[], mismatch=[];
  ids.forEach(function(id){
    if(!(id in valuesById)){ missing.push(id); return; }
    var actual=String(valuesById[id]||"").trim();
    var expected=String(CFG_REQUIRED_VALUES[id]||"").trim();
    if(actual!==expected){
      mismatch.push(id+"="+actual+" (expected "+expected+")");
    }
  });
  return {missing:missing,mismatch:mismatch};
}
function parseQuickPreviewValues(text){

    var m=line.match(/^\s*-\s*(\d+)\s*\|[^=]*=\s*([^\r\n(]+)(?:\s*\(|\s*$)/);
    if(m) out[m[1]]=m[2].trim();
  });
  return out;
}
function renderCfgValidationRows(){

  ids.forEach(function(id){

      +' | <strong style="color:'+color+';">'+status+'</strong>'
      +'</div>');
  });
  rows.push('</div>');
  return rows.join("");
}
function cfgMappedValue(fieldId, raw){
  var PROTOCOL_MAP={"0":"TCP","1":"UDP","2":"MQTT"};
  var BOOL_MAP={"0":"False","1":"True"};
  var SERVER_MODE_MAP={"0":"Disabled","1":"Backup","2":"Duplicate"};
  if(fieldId==="2006"||fieldId==="2009") return PROTOCOL_MAP[raw]||raw;
  if(fieldId==="2010") return SERVER_MODE_MAP[raw]||raw;
  if(fieldId==="13003") return BOOL_MAP[raw]||raw;
  return raw;
}
function buildCfgPreviewText(filePath, parsed){
  var n=parsed.numeric||{}, h=parsed.header||{};
  var ids=["2001","2002","2003","2004","2005","2006","2007","2008","2009","2010","13000","13001","13002","13003"];
  var lines=[
    "Loaded file: "+(filePath||""),
    "Header fields: "+Object.keys(h).length,
    "Numeric fields: "+Object.keys(n).length,
    "",
    "Quick preview:"
  ];
  ids.forEach(function(id){
    if(!(id in n)) return;
    var name=CFG_KNOWN_FIELDS[id]||"unknown";
    var raw=n[id];
    var mapped=cfgMappedValue(id, raw);
    lines.push("- "+id+" | "+name+" = "+raw+" ("+mapped+")");
  });
  return lines.join("\n");
}
function extractNavixyFromText(text){
  var t=String(text||"");
  var dm=t.match(/^\s*-\s*2004\s*\|[^=]*=\s*([^\r\n(]+)(?:\s*\(|\s*$)/m);
  var pm=t.match(/^\s*-\s*2005\s*\|[^=]*=\s*([^\r\n(]+)(?:\s*\(|\s*$)/m);
  return {
    domain: dm?dm[1].trim():"",
    port: pm?pm[1].trim():""
  };
}
function applyNavixyFromCfg(domain, port){

    if(S.navixeIp!==d){

  if(p){

      S.navixePort=p;
      S.navixeApproved="";
    }
  }
}
async function decodeCfgFile(file){
  var ab=await file.arrayBuffer();
  var bytes=new Uint8Array(ab);
  try{
    if(typeof DecompressionStream!=="undefined"){
      var ds=new DecompressionStream("gzip");
      var stream=new Blob([bytes]).stream().pipeThrough(ds);
      var resp=new Response(stream);
      return await resp.text();
    }
  }catch(e){}
  return new TextDecoder("utf-8",{fatal:false}).decode(bytes);
}

function runCfgAutoCheck(fileName, text){
  var expected=expectedCfgName();
  var parsed=parseCfgText(text);
  var n=parsed.numeric||{};
  var req=["2001","2002","2004","2005","2006","2007","2008","2009","2010","13000","13001","13002","13003"];
  var check=validateCfgValues(n);
  var missing=check.missing;
  var mismatch=check.mismatch;
  var fileOk=(String(fileName||"").toLowerCase().indexOf(expected.toLowerCase())>=0);
  var dateOk=/\d{8}/.test(String(fileName||""));
  var ok=(missing.length===0)&&(mismatch.length===0)&&fileOk&&dateOk;
  var details=[];
  details.push("Expected CFG: "+expected);
  details.push("Selected file: "+(fileName||"—"));
  details.push(fileOk?"Filename rule: OK":"Filename rule: MISMATCH");
  details.push(dateOk?"Date in filename: OK":"Date in filename: MISSING");
  details.push(missing.length?("Missing params: "+missing.join(", ")):"Missing params: none");
  details.push(mismatch.length?("Value mismatch: "+mismatch.join(", ")):"Value mismatch: none");
  S.cfgFileName=fileName||"";
  S.cfgLoadedFile=fileName||S.cfgLoadedFile;
  S.cfgViewerPreview=buildCfgPreviewText(fileName||"", parsed);
  applyNavixyFromCfg(n["2004"]||"", n["2005"]||"");
  if(!S.cfgNavixyDomain || !S.cfgNavixyPort){
    var fromPreview=extractNavixyFromText(S.cfgViewerPreview);
    applyNavixyFromCfg(fromPreview.domain, fromPreview.port);
  }
  S.cfgAutoStatus=ok?"pass":"fail";
  S.cfgAutoReport=details.join(" | ");
  if(ok) S.cfgVerified="yes";
}

function runPySummaryCheck(text){
  var t=String(text||"");
  var expected=expectedCfgName();
  var parsedValues=parseQuickPreviewValues(t);
  var check=validateCfgValues(parsedValues);
  var miss=check.missing;
  var mismatch=check.mismatch;

  var loadedMatch=t.match(/Loaded file:\s*(.+)/i);
  var filePath=loadedMatch?loadedMatch[1].trim():"";
  if(filePath) S.cfgLoadedFile=filePath;
  var fileName=filePath?filePath.split(/[\\\/]/).pop():"";
  var lower=fileName.toLowerCase();
  var baseOk=lower.indexOf(expected.toLowerCase())===0;
  var dateOk=/\d{8}/.test(fileName);
  var extOk=/\.cfg$/i.test(fileName);

  var ok=(miss.length===0)&&(mismatch.length===0)&&baseOk&&dateOk&&extOk;
  var details=[];
  details.push("Expected CFG: "+expected);
  details.push("Loaded file: "+(fileName||"—"));
  details.push(baseOk?"Prefix rule: OK":"Prefix rule: MISMATCH");
  details.push(dateOk?"Date in filename: OK":"Date in filename: MISSING");
  details.push(extOk?"Extension: .cfg":"Extension: INVALID");
  details.push(miss.length?("Missing preview IDs: "+miss.join(", ")):"Missing preview IDs: none");
  details.push(mismatch.length?("Preview value mismatch: "+mismatch.join(", ")):"Preview value mismatch: none");

  S.cfgAutoStatus=ok?"pass":"fail";
  S.cfgAutoReport=details.join(" | ");
  S.cfgViewerPreview=t;
  var fromPy=extractNavixyFromText(t);
  applyNavixyFromCfg(fromPy.domain, fromPy.port);
  if(ok) S.cfgVerified="yes";
}

  } else if(step===2){

    else if(validate("deviceName",S.deviceName)) m.push("שם FOTAWEB");
    if(validate("simNum",S.simNum)) m.push("SIM MSISDN בטראקר");
    if(validate("smsPass",S.smsPass)) m.push("סיסמת SMS לא תקינה");
  } else if(step===4){
    if(S.cfgVerified!=="yes" && S.cfgAutoStatus!=="pass") m.push("אישור אימות קונפיג ב-CFG Viewer");
  } else if(step===5){
    if(!(S.navixeIp||"").trim()) m.push("Server IP / Domain לנביקסי");
    if(validate("navixePort",S.navixePort)) m.push("Port נביקסי");
    if(S.cfgNavixyDomain && S.navixeApproved!=="yes") m.push("אישור שימוש בנתוני Navixy מה-Registration (2004/2005)");
  }
  return m;
}

function buildCSV(){
  var ts=new Date().toISOString();
  var rows=[];
  rows.push(["FMC650 Installation Log"]);
  rows.push(["תאריך שעה",ts]);
  rows.push(["טכנאי",S.techName,"טלפון",S.techPhone]);
  rows.push([]);
  rows.push(["=== פרטי כלי ==="]);
  rows.push(["GSE / ELAL license",gseFormatted()]);
  rows.push([]);
  rows.push(["=== ELAL Upgrade.xls — Sheet_1 ==="]);
  rows.push(["Category",S.division]);
  rows.push(["GSE digits",S.gse]);
  rows.push(["Energy",S.energy]);
  rows.push(["Energy capacity — tank [L] / battery [kW]",S.tankBatterySpec]);
  rows.push(["Installation Date",S.installationDate]);
  rows.push(["Name (Navixy/FOTAWEB)",S.deviceName]);
  rows.push(["IMEI",S.imei]);
  rows.push(["Contact Name",S.contactName]);
  rows.push(["Phone Number",S.excelPhone]);
  rows.push([]);
  rows.push(["=== Teltonika Activation ==="]);
  rows.push(["Expected Config",expectedCfgName()]);
  rows.push(["Loaded CFG File",S.cfgLoadedFile]);
  rows.push(["CFG Verified",S.cfgVerified==="yes"?"כן":"לא"]);
  rows.push([]);
  rows.push(["=== SIM / SMS (טראקר) ==="]);
  rows.push(["SIM MSISDN",S.simNum]);
  rows.push(["ICCID",S.iccid]);
  rows.push(["סיסמת SMS",S.smsPass?"הוגדרה":"לא הוגדרה"]);
  rows.push([]);
  rows.push(["=== נביקסי ==="]);
  rows.push(["Server IP",S.navixeIp]);
  rows.push(["Port",S.navixePort]);
  rows.push([]);
  rows.push(["=== תוצאות צ'קליסטים ==="]);
  rows.push(["שלב","מזהה","תיאור","תוצאה"]);
  [1,2,3,4,5,6].forEach(function(step){
    CHECKLISTS[step].forEach(function(item){
      rows.push(["שלב "+step+": "+STEPS_META[step-1].label,
        item.id,item.t,S.checks[step][item.id]?"✓ עבר":"✗ לא בוצע"]);
    });
  });
  rows.push([]);
  rows.push(["=== סיכום ==="]);
  [1,2,3,4,5,6].forEach(function(s){
    rows.push(["שלב "+s,doneCount(s)+"/"+totalCount(s),stepComplete(s)?"הושלם":"לא הושלם"]);
  });
  var allOk=[1,2,3,4,5,6].every(stepComplete);
  rows.push(["תוצאה כללית",allOk?"✅ ההתקנה הושלמה בהצלחה":"⚠️ ההתקנה לא הושלמה"]);
  rows.push([]);
  rows.push(["הערות",S.notes]);
  var BOM="\uFEFF";
  return BOM+rows.map(function(r){
    return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(",");
  }).join("\r\n");
}

function exportCSV(){
  var csv=buildCSV();
  var fname="FMC650_"+exportVehicleTag()+"_"+new Date().toISOString().slice(0,10)+".csv";
  try {
    var blob=new Blob([csv],{type:"text/csv;charset=utf-8;"});
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();
    document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  } catch(e){
    var a2=document.createElement("a");
    a2.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
    a2.download=fname;
    document.body.appendChild(a2);a2.click();
    document.body.removeChild(a2);
  }
}

function copyToClipboard(){
  var lines=[
    "FMC650 — סיכום התקנה","תאריך: "+nowStr(),
    "טכנאי: "+(S.techName||"—"),
    "GSE (ELAL): "+(gseFormatted()||"—"),
    "Category: "+(S.division||"—"),
    "IMEI: "+(S.imei||"—"),"FOTAWEB: "+(S.deviceName||"—"),
    "נביקסי: "+(S.navixeIp?S.navixeIp+":"+S.navixePort:"—"),
    "",
    [1,2,3,4,5,6].map(function(s){return "שלב "+s+": "+doneCount(s)+"/"+totalCount(s);}).join(" | "),
    [1,2,3,4,5,6].every(stepComplete)?"✅ הושלם":"⚠️ חלקי",
  ].join("\n");
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(lines)
      .then(function(){alert("✅ הסיכום הועתק ללוח");})
      .catch(function(){fallbackCopy(lines);});
  } else { fallbackCopy(lines); }
}

function fallbackCopy(text){
  var ta=document.createElement("textarea");
  ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand("copy");alert("✅ הסיכום הועתק ללוח");}
  catch(e){alert("לא ניתן להעתיק אוטומטית — בחר הכל ידנית");}
  document.body.removeChild(ta);
}

var FIELD_HINTS = {
  imei:       function(v){ return validate("imei",v)?"":(v?"✅ IMEI תקין":"ממדבקה/Configurator"); },
  deviceName: function(v){ return validate("deviceName",v)?"":(v?"✅ פורמט תקין":"פורמט: GSE-ACU-5032"); },
  simNum:     function(v){ return validate("simNum",v)?"":(v?"✅ מספר טלפון תקין":"מספר טלפון 9–15 ספרות (אפשר +)"); },
  vin:        function(v){ return validate("vin",v)?"":(v?"✅ VIN תקין ("+v.length+"/17)":"17 תווים"); },
  iccid:      function(v){ return ""; },
  navixePort: function(v){ return ""; },
  smsPass:    function(v){ return ""; },
};

function updateFieldUI(elId, key, val){
  var el=document.getElementById(elId);
  if(!el) return;
  // Update border class
  var base=el.className.replace(/\s*(invalid|valid)/g,"");
  var err=validate(key,val);
  if(err) el.className=base+" invalid";
  else if(val&&!err) el.className=base+" valid";
  else el.className=base;
  // Update hint/error element (data-hint attribute set in hintHtml())
  var hint=document.querySelector("[data-hint='"+key+"']");
  if(!hint) return;
  if(err){
    hint.className="form-err";
    hint.textContent="⚠️ "+err;
  } else {
    hint.className="form-hint";
    hint.textContent=FIELD_HINTS[key]?FIELD_HINTS[key](val):"";
  }
}

function saveNotes(){
  var nt=document.getElementById("notes");
  if(nt) S.notes=nt.value;
}

// rerenderOnBlur=true: full re-render when user leaves field
// (updates inherited banners, preview boxes, config filename, etc.)
// During typing: only in-place validation — no focus loss
function bindField(elId, key, rerenderOnBlur){
  var el=document.getElementById(elId);
  if(!el) return;
  el.addEventListener("input",function(e){
    S[key]=e.target.value;
    saveState();
    if(VALIDATORS[key]) updateFieldUI(elId,key,e.target.value);
  });
  if(rerenderOnBlur){
    el.addEventListener("blur",function(){
      saveNotes();
      // Small delay so pending click events (checklist items etc.) fire first
      setTimeout(render,50);
    });
  }
}

function bindSelect(elId, key, rerenderOnChange){
  var el=document.getElementById(elId);
  if(!el) return;
  el.addEventListener("change",function(e){
    S[key]=e.target.value;
    if(key==="division"){
      S.unit=S.division;
      var sn=suggestedDeviceName();
      if(sn && (!S.deviceName || /^GSE-[A-Za-z]+-\d{4,5}$/.test(S.deviceName))) S.deviceName=sn;
    }
    saveState();
    if(rerenderOnChange) setTimeout(render,50);
  });
}

function setupSwipe(){
  var card=document.getElementById("main-card");
  if(!card) return;
  var sx=0,sy=0;
  card.addEventListener("touchstart",function(e){
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
  },{passive:true});
  card.addEventListener("touchend",function(e){
    var dx=e.changedTouches[0].clientX-sx;
    var dy=e.changedTouches[0].clientY-sy;
    if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>60){
      if(dx<0&&S.step<6){
        if(canAdvanceFromStep(S.step)){S.step++;saveNotes();render();}
      } else if(dx>0&&S.step>1){S.step--;saveNotes();render();}
    }
  },{passive:true});
}

      e.target.value=d;
      saveState();
      updateFieldUI("imei","imei",d);
    });
    imeiEl.addEventListener("blur",function(){saveNotes();setTimeout(render,50);});
  }
  var dnEl=document.getElementById("deviceName");
  if(dnEl){
    dnEl.addEventListener("input",function(e){
      S.deviceName=e.target.value;
      S.contactName=S.deviceName||"";
      saveState();
      updateFieldUI("deviceName","deviceName",e.target.value);
    });
    dnEl.addEventListener("blur",function(){saveNotes();setTimeout(render,50);});
  }
  bindField("simNum","simNum",true);
  bindField("iccid","iccid",false);
  bindField("smsPass","smsPass",true);
  bindField("excelPhone","excelPhone",false);

  // Step 4 — Teltonika activation
  bindField("cfgLoadedFile","cfgLoadedFile",false);
  bindSelect("cfgVerified","cfgVerified",true);
  var cfgFile=document.getElementById("cfgFileInput");
  if(cfgFile){
    cfgFile.addEventListener("change",async function(e){
      var f=(e.target.files&&e.target.files[0])?e.target.files[0]:null;
      if(!f) return;
      try{
        var decoded=await decodeCfgFile(f);
        runCfgAutoCheck(f.name, String(decoded||""));
        saveState();
        setTimeout(render,30);
      }catch(err){
        S.cfgAutoStatus="fail";
        S.cfgAutoReport="Failed reading selected file";
        S.cfgViewerPreview="";
        saveState();
        setTimeout(render,30);
      }
    });
  }
  var pyTxt=document.getElementById("cfgPySummary");
  if(pyTxt) pyTxt.addEventListener("input",function(e){
    S.cfgAutoReport=e.target.value;
    saveState();
  });
  var pyBtn=document.getElementById("btn-cfg-verify-py");
  if(pyBtn) pyBtn.addEventListener("click",function(){
    runPySummaryCheck(S.cfgAutoReport||"");
    saveState();
    setTimeout(render,30);
  });

  // Step 5 — Navixe fields
  if(S.cfgNavixyDomain||S.cfgNavixyPort){
    bindSelect("navixeApproved","navixeApproved",true);
  } else {
    bindField("navixeIp","navixeIp",true);
    bindField("navixePort","navixePort",false);
  }

  // Tech fields
  bindField("techName","techName",false);
  bindField("techPhone","techPhone",false);

  var btnClr=document.getElementById("btn-clear-form");
  if(btnClr) btnClr.addEventListener("click",function(){saveNotes();clearInstallationKeepTech();});
  var btnNew=document.getElementById("btn-save-new");
  if(btnNew) btnNew.addEventListener("click",function(){
    if(!confirm("לשמור קובץ CSV של ההתקנה הנוכחית ולאפס טופס לכלי הבא?\nפרטי הטכנאי יישארו.")) return;
    saveCsvAndNewKeepTech();
  });

  // Nav buttons
  var prev=document.getElementById("btn-prev");
  if(prev) prev.addEventListener("click",function(){
    saveNotes();S.step=Math.max(1,S.step-1);render();
  });
  var next=document.getElementById("btn-next");
  if(next) next.addEventListener("click",function(){
    saveNotes();
    if(!canAdvanceFromStep(S.step)) return;
    if(S.completed.indexOf(S.step)<0) S.completed.push(S.step);
    if(S.step<6){S.step++;render();}else{S.done=true;render();}
    saveState();
  });

  // Done screen
  var csv=document.getElementById("btn-csv");
  if(csv) csv.addEventListener("click",exportCSV);
  var copy=document.getElementById("btn-copy");
  if(copy) copy.addEventListener("click",copyToClipboard);
  var print=document.getElementById("btn-print");
  if(print) print.addEventListener("click",function(){window.print();});
  var restart=document.getElementById("btn-restart");
  if(restart) restart.addEventListener("click",function(){
    if(!confirm("להתחיל התקנה חדשה?\nכל הנתונים הנוכחיים יימחקו.")) return;
    S.step=1;S.completed=[];S.checks={1:{},2:{},3:{},4:{},5:{},6:{}};S.done=false;
    S.techName="";S.techPhone="";
    S.licensePlate="";S.vehicleType="GSE";S.vin="";
    S.site="TLV - Tel-aviv";S.division="";S.unit="";
    S.gse="";S.energy="";S.tankBatterySpec="";S.installationDate="";
    S.imei="";S.deviceName="";S.simNum="";S.iccid="";S.smsPass="";
    S.contactName="";S.excelPhone="";
    S.cfgLoadedFile="";S.cfgVerified="";
    S.cfgFileName="";S.cfgAutoStatus="";S.cfgAutoReport="";S.cfgViewerPreview="";
    S.cfgNavixyDomain="";S.cfgNavixyPort="";
    S.navixeIp="";S.navixePort="5027";S.navixeApproved="";S.notes="";
    try{localStorage.removeItem(STORAGE_KEY);localStorage.removeItem("fmc650_wizard_v3");}catch(e){}
    render();
  });

  setupSwipe();
}

// ════════════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════════════
loadState();
render();
</script>
</body>
</html>
